<!DOCTYPE html>
<html lang="zh">

<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="https://i.p-i.vip/68/20260216-6992ee9535809.webp" type="image/x-icon">
  
  <title>安全跳转提示</title>
  <style type="text/css">
    * {
      box-sizing: border-box;
    }

    @import url("https://fontsapi.zeoseven.com/292/main/result.css");
    * {
      font-family: LXGW WenKai, LXGW WenKai, "LXGW WenKai", Roboto, "LXGW WenKai", LXGW WenKai, sans-serif;
    }

    body {
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      background: #fff url("https://i.p-i.vip/68/20260329-69c8df9bb4c97.webp") no-repeat fixed center;
      font-family: LXGW WenKai, LXGW WenKai, "LXGW WenKai", Roboto, "LXGW WenKai", LXGW WenKai, sans-serif;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 20px;
    }

    .main-card {
      display: flex;
      width: 800px;
      max-width: 95vw;
      min-height: 450px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .left-panel {
      width: 40%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: #A8D6D2;
      color: white;
    }

    .right-panel {
      width: 60%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: #fff;
      position: relative;
    }

    .avatar-wrapper {
      width: 100px;
      height: 100px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.2);
    }

    .avatar-placeholder,
    .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      text-align: center;
      line-height: 1.2;
      padding: 5px;
    }

    .avatar {
      display: none;
    }

    .site-title {
      font-size: 28px;
      font-weight: 600;
      color: white;
      margin-bottom: 10px;
      text-align: center;
    }

    .site-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
    }

    .info-text {
      font-size: 14px;
      color: #606266;
      margin-bottom: 20px;
      text-align: center;
      width: 100%;
    }

    .url-box {
      width: 100%;
      border: 2px solid #e4e7ed;
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      background: #f5f7fa;
      position: relative;
      transition: border-color 0.3s;
    }

    .url-box:hover {
      border-color: #A8D6D2;
    }

    .url-text-display {
      flex: 1;
      font-size: 14px;
      color: #606266;
      word-break: break-all;
      margin-right: 10px;
      font-family: monospace;
    }

    .copy-btn {
      width: 32px;
      height: 32px;
      cursor: pointer;
      color: #909399;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: 6px;
      transition: all 0.3s;
    }

    .copy-btn:hover {
      background: #f0f9f8;
      color: #A8D6D2;
    }

    .copy-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .copy-toast {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: #67c23a;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .copy-toast.show {
      opacity: 1;
      visibility: visible;
      top: -50px;
    }

    /* 提示框 - 使用 #A8D6D2 色系 */
    .warning-box {
      width: 100%;
      padding: 12px 16px;
      background: #f0f9f8;
      border-left: 4px solid #A8D6D2;
      border-radius: 6px;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .warning-icon {
      color: #5a9a96;
      flex-shrink: 0;
    }

    .warning-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .warning-text {
      font-size: 13px;
      color: #606266;
      line-height: 1.6;
      flex: 1;
    }

    .countdown-number {
      font-weight: bold;
      color: #5a9a96;
      margin: 0 2px;
    }

    .btn-group {
      display: flex;
      gap: 15px;
      width: 100%;
    }

    .btn {
      flex: 1;
      height: 42px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-cancel {
      background: #f4f4f5;
      color: #909399;
    }

    .btn-cancel:hover {
      background: #e9e9eb;
      color: #606266;
    }

    .btn-confirm {
      background: #A8D6D2;
      color: white;
      box-shadow: 0 4px 12px rgba(168, 214, 210, 0.3);
    }

    .btn-confirm:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(168, 214, 210, 0.4);
    }

    @media (max-width: 768px) {
      .main-card {
        flex-direction: column;
        min-height: auto;
        width: 100%;
      }

      .left-panel,
      .right-panel {
        width: 100%;
        padding: 30px 20px;
      }

      .btn-group {
        flex-direction: column;
      }
    }
  </style>
  <script type="text/javascript">
    function GetQueryString(name) {
      var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)", "i");
      var r = window.location.search.substr(1).match(reg);
      return r ? decodeURI(r[2]) : null;
    }

    function decodeSafeUrlParam(paramStr) {
      if (!paramStr) {
        return paramStr;
      }
      var base64 = paramStr.replace(/-/g, "+").replace(/_/g, "/");
      var paddingLength = (4 - (base64.length % 4)) % 4;
      if (paddingLength) {
        base64 += "=".repeat(paddingLength);
      }
      return decodeURIComponent(atob(base64).split("").map(function (char) {
        return "%" + ("00" + char.charCodeAt(0).toString(16)).slice(-2);
      }).join(""));
    }

    // 模板变量
    let countdown = 5;
    let total_countdown = 5;
    let jump_url = GetQueryString('u');

    
    try {
      jump_url = decodeSafeUrlParam(jump_url);
    } catch (error) {
      jump_url = null;
    }
    

    const UrlReg = /^(http|https|thunder|qqdl|ed2k|Flashget|qbrowser|ftp|rtsp|mms):\/\//i;
    if (!jump_url || !UrlReg.test(jump_url)) {
      document.title = '参数错误';
      jump_url = location.origin;
    }

    let progressElement;
    let countdownSpan;
    let jumpUrlElement;

    function updateCountdown() {
      if (countdownSpan) {
        countdownSpan.innerHTML = '页面将在 <span class="countdown-number">' + countdown + '</span> 秒后自动跳转，请自行确认链接安全性';
      }

      if (countdown === 0) {
        jump();
      } else {
        countdown--;
        setTimeout(updateCountdown, 1000);
      }
    }

    function jump() {
      location.href = jump_url;
    }

    function closeWindow() {
      function isWeChat() {
        return /MicroMessenger/i.test(navigator.userAgent);
      }

      function isQQ() {
        return /QQ/i.test(navigator.userAgent) && !/MicroMessenger/i.test(navigator.userAgent);
      }

      if (isWeChat()) {
        if (typeof WeixinJSBridge !== "undefined") {
          WeixinJSBridge.call("closeWindow");
        } else {
          document.addEventListener("WeixinJSBridgeReady", function () {
            WeixinJSBridge.call("closeWindow");
          }, false);
        }
      } else if (isQQ()) {
        if (typeof mqq !== "undefined" && mqq.ui && mqq.ui.closeWebView) {
          mqq.ui.closeWebView();
        } else {
          window.history.back();
        }
      } else {
        window.opener = null;
        window.open("", "_self");
        window.close();
      }
    }

    function copyToClipboard() {
      const urlText = jump_url;
      if (!urlText) {
        showToast('暂无可复制内容', 'error');
        return;
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(urlText).then(function () {
          showToast('复制成功');
        }).catch(function () {
          fallbackCopy(urlText);
        });
      } else {
        fallbackCopy(urlText);
      }
    }

    function fallbackCopy(text) {
      const tempInput = document.createElement("input");
      tempInput.value = text;
      tempInput.style.position = 'absolute';
      tempInput.style.left = '-9999px';
      document.body.appendChild(tempInput);
      tempInput.select();
      try {
        document.execCommand("copy");
        showToast('复制成功');
      } catch (error) {
        showToast('复制失败', 'error');
      }
      document.body.removeChild(tempInput);
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById("copy-toast");
      if (toast) {
        toast.textContent = message;
        if (type === 'error') {
          toast.style.background = '#f56c6c';
        } else {
          toast.style.background = '#67c23a';
        }
        toast.classList.add('show');
        setTimeout(function () {
          toast.classList.remove('show');
        }, 2000);
      }
    }

    async function loadAvatar() {
      const avatarImg = document.querySelector(".avatar");
      const placeholder = document.querySelector(".avatar-placeholder");
      if (!avatarImg || !placeholder) return;

      const img = new Image();
      img.src = "https://i.p-i.vip/68/20260216-6992ee9535809.webp";
      img.onload = function () {
        avatarImg.src = img.src;
        avatarImg.style.display = "block";
        placeholder.style.display = "none";
      };
      img.onerror = function () {
        placeholder.style.display = "flex";
      }
    }

    window.addEventListener("load", function () {
      loadAvatar();
      countdownSpan = document.getElementById("countdown-placeholder");
      jumpUrlElement = document.getElementById("jump-url-text");
      if (jumpUrlElement) {
        jumpUrlElement.textContent = jump_url;
      }
      updateCountdown();
    });
  </script>
</head>

<body>
  <div class="container">
    <div class="main-card">
      <!-- 左侧面板 -->
      <div class="left-panel">
        <div class="avatar-wrapper">
          <div class="avatar-placeholder">沃什<br>头像</div>
          <img src="" alt="头像" class="avatar">
        </div>
        <div class="site-title">Hanta安全跳转</div>
        <div class="site-subtitle">安全提示</div>
      </div>

      <!-- 右侧面板 -->
      <div class="right-panel">
        <div class="info-text">您即将离开本站，跳转到以下外部链接：</div>

        <!-- URL显示框 - 带复制按钮 -->
        <div class="url-box">
          <span class="url-text-display" id="jump-url-text"></span>
          <button class="copy-btn" onclick="copyToClipboard()" title="复制链接" aria-label="复制链接">
            <svg viewBox="0 0 24 24">
              <path
                d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
            </svg>
          </button>
          <div class="copy-toast" id="copy-toast">复制成功</div>
        </div>

        <!-- 提示框 - 使用 #A8D6D2 色系 -->
        <div class="warning-box">
          <div class="warning-icon">
            <svg viewBox="0 0 24 24">
              <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" />
            </svg>
          </div>
          <div class="warning-text" id="countdown-placeholder">
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-cancel" onclick="closeWindow()">取消跳转</button>
          <button class="btn btn-confirm" onclick="jump()">立即跳转</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
